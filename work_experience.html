<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Experience — Devashish Mishra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar" id="navbar"></nav>

  <section class="section" style="padding-top: 100px;">
    <div class="section-header">
      <span class="section-tag">// work_experience</span>
      <h1 class="section-title">Where I've Worked</h1>
    </div>
    <div class="experience-list" id="experience-list"></div>
  </section>

  <footer class="site-footer" id="footer"></footer>

  <script src="render.js"></script>
  <script>
    document.addEventListener('dataReady', function () {
      document.getElementById('experience-list').innerHTML = EXPERIENCE.map(function(company, ci) {
        var rolesHTML = company.roles.map(function(role) {
          return '<div class="exp-role">' +
            '<div class="exp-role-title">' + role.title + '</div>' +
            '<ul class="exp-bullets">' +
            role.bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('') +
            '</ul></div>';
        }).join('');
        return '<div class="exp-company" ' + (ci > 0 ? 'style="margin-top:16px;"' : '') + '>' +
          '<div class="exp-company-header">' +
            '<div class="exp-company-name">' + company.company + '</div>' +
            '<div class="exp-company-period">' + company.period + '</div>' +
          '</div>' +
          '<div class="exp-roles">' + rolesHTML + '</div>' +
          '</div>';
      }).join('');
    });
  </script>
</body>
</html>
