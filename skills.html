<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills — Devashish Mishra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar" id="navbar"></nav>

  <section class="section" style="padding-top: 100px;">
    <div class="section-header">
      <span class="section-tag">// skills</span>
      <h1 class="section-title">Technical Arsenal</h1>
    </div>
    <div class="skills-grid" id="skills-grid"></div>
  </section>

  <footer class="site-footer" id="footer"></footer>

  <script src="render.js"></script>
  <script>
    document.addEventListener('dataReady', function () {
      document.getElementById('skills-grid').innerHTML = SKILLS.map(function(cat) {
        return '<div class="skill-card">' +
          '<div class="skill-card-icon" style="background:' + cat.color + '">' + cat.icon + '</div>' +
          '<div class="skill-card-title">' + cat.title + '</div>' +
          '<div class="skill-tags">' +
          cat.tags.map(function(t) { return '<span class="skill-tag">' + t + '</span>'; }).join('') +
          '</div></div>';
      }).join('');
    });
  </script>
</body>
</html>
