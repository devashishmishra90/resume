<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Devashish Mishra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar" id="navbar"></nav>

  <section class="section" style="padding-top: 100px;">
    <div class="section-header">
      <span class="section-tag">// projects</span>
      <h1 class="section-title">Things I've Built</h1>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
  </section>

  <footer class="site-footer" id="footer"></footer>

  <script src="render.js"></script>
  <script>
    document.addEventListener('dataReady', function () {
      document.getElementById('projects-grid').innerHTML = PROJECTS.map(function(p) {
        return '<div class="project-card" onclick="toggleProject(this)">' +
          '<div class="project-card-header">' +
            '<h3>' + p.title + '</h3>' +
            '<span class="project-expand-icon">+</span>' +
          '</div>' +
          '<p class="project-desc">' + p.description + '</p>' +
          '<div class="project-tech">' +
            p.tech.map(function(t) { return '<span class="tech-badge">' + t + '</span>'; }).join('') +
          '</div>' +
          '<div class="project-details-panel">' +
            '<ul>' + p.bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('') + '</ul>' +
          '</div></div>';
      }).join('');
    });

    function toggleProject(card) {
      var panel = card.querySelector('.project-details-panel');
      var icon = card.querySelector('.project-expand-icon');
      var isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      icon.textContent = isOpen ? '+' : '−';
      icon.style.color = isOpen ? '' : 'var(--accent-cyan)';
    }
  </script>
</body>
</html>
